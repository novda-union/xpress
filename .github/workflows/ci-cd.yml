name: CI/CD

on:
  push:
    branches:
      - master

concurrency:
  group: production-main
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  notify_start:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram start notification
        env:
          BOT_TOKEN: ${{ secrets.NOTIFY_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.NOTIFY_CHAT_ID }}
        run: |
          TEXT="xpressgo%0ACI%2FCD%20started"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}&text=${TEXT}"

  quality:
    runs-on: ubuntu-latest
    needs: notify_start
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            admin/package-lock.json

      - name: Install server lint tool
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install web dependencies
        run: npm --prefix web ci

      - name: Install admin dependencies
        run: npm --prefix admin ci

      - name: Install nginx
        run: |
          sudo apt-get update
          sudo apt-get install -y nginx

      - name: Run quality gates
        run: make quality

      - name: Run server tests
        run: make test

      - name: Validate Docker Compose
        run: docker compose config >/dev/null

      - name: Validate Nginx
        run: sudo nginx -t -c "$GITHUB_WORKSPACE/infra/nginx/nginx.test.conf" -p "$GITHUB_WORKSPACE"

  deploy:
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            'APP_DIR=/opt/xpressgo bash /opt/xpressgo/infra/deploy/deploy.sh'

  notify:
    runs-on: ubuntu-latest
    needs: [quality, deploy]
    if: always()
    steps:
      - name: Send Telegram notification
        env:
          BOT_TOKEN: ${{ secrets.NOTIFY_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.NOTIFY_CHAT_ID }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          if [ "$QUALITY_RESULT" = "success" ] && [ "$DEPLOY_RESULT" = "success" ]; then
            TEXT="xpressgo%0A%E2%9C%85 Deployed successfully"
          elif [ "$QUALITY_RESULT" != "success" ]; then
            TEXT="xpressgo%0A%E2%9D%8C Quality failed%0A$QUALITY_RESULT"
          else
            TEXT="xpressgo%0A%E2%9D%8C Deploy failed%0A$DEPLOY_RESULT"
          fi
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}&text=${TEXT}"
