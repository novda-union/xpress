name: CI/CD

on:
  push:
    branches:
      - master

concurrency:
  group: production-main
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            admin/package-lock.json

      - name: Install server lint tool
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install web dependencies
        run: npm --prefix web ci

      - name: Install admin dependencies
        run: npm --prefix admin ci

      - name: Install nginx
        run: |
          sudo apt-get update
          sudo apt-get install -y nginx

      - name: Run quality gates
        run: make quality

      - name: Run server tests
        run: make test

      - name: Validate Docker Compose
        run: docker compose config >/dev/null

      - name: Validate Nginx
        run: sudo nginx -t -c "$GITHUB_WORKSPACE/infra/nginx/nginx.test.conf" -p "$GITHUB_WORKSPACE"

  deploy:
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            'APP_DIR=/opt/xpressgo bash /opt/xpressgo/infra/deploy/deploy.sh'
