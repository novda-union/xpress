worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  keepalive_timeout 65;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  upstream xpressgo_web {
    server web:5173;
  }

  upstream xpressgo_server {
    server server:8080;
  }

  server {
    listen 443 ssl;
    server_name xpressgo.home.arpa;

    ssl_certificate /etc/nginx/certs/xpressgo.home.arpa.crt;
    ssl_certificate_key /etc/nginx/certs/xpressgo.home.arpa.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;

    location = /ws {
      proxy_pass http://xpressgo_server;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location ^~ /ws/ {
      proxy_pass http://xpressgo_server;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location ~ ^/(admin|api|auth|branches|discover|health|orders|stores)(/|$) {
      proxy_pass http://xpressgo_server;
    }

    location / {
      proxy_pass http://xpressgo_web;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }
}
